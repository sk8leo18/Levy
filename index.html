<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Levy</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="background.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>
  <canvas id="particles"></canvas>

  <div class="enter-screen" id="enterScreen">
    <div class="enter-box">
      <h1>Levy</h1>
      <p>clique para entrar</p>
      <button id="enterBtn" type="button">Entrar</button>
    </div>
  </div>

  <main class="hero">
    <section class="profile">
      <img src="image.jpeg" class="avatar" alt="Foto de Levy">

      <h1 class="main-name">Levy</h1>
      <p class="subtitle">just one day</p>

      <div class="social">
        <a href="https://www.instagram.com/sk8leo12/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://open.spotify.com/user/31kpldkfbangx2esdr4gmxo7saga" target="_blank" rel="noopener noreferrer">Spotify</a>
      </div>

      <div class="player">
        <img src="cover.jpg" class="cover" alt="Capa da música">

        <div class="info">
          <div class="track-header">
            <strong>Soft Porn</strong>
            <span>Puma Blue</span>
          </div>

          <div class="progress-area">
            <span id="currentTime">0:00</span>
            <input type="range" id="progress" value="0" min="0" step="1">
            <span id="duration">0:00</span>
          </div>
        </div>

        <button id="playBtn" type="button" aria-label="Tocar música">▶</button>
      </div>

      <audio id="audio" src="music.mp3"></audio>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
